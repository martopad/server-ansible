- name: Copy samba USE flags
  ansible.builtin.copy:
    src: samba
    dest: /etc/portage/package.use/samba
    owner: root
    group: root
    mode: '0644'

- name: Install samba tools
  community.general.portage:
    getbinpkg: true
    package: 
      - net-fs/samba
      - net-fs/cifs-utils

- name: Make sure base mount point is created and mounted
  ansible.builtin.include_role:
    name: common
    tasks_from: mount_storage_pool.yaml

- name: Copy samba configuration file.
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload samba services

- name: Enable samba server services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  with_items:
    - smb.service

