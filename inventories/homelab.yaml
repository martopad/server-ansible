homelab:
  hosts:
    un100d03:
      is_bcachefs: True
      is_nfs: True
      is_samba: True
      mount_point: /export/storage/pool1
      nfs_exports: [
        "{{ mount_point }} *(insecure,no_subtree_check,rw,sync,crossmnt,fsid=0)",
        "{{ mount_point }}/data *(insecure,no_subtree_check,rw,sync)"
      ]
      samba_exports:
        - comment: My share
          create_mode: "0777"
          guest_ok: "yes"
          path: "{{ mount_point }}/data"
          public: "yes"
          share_name: MyShare
          writable: "yes"
      # Minisforum UN100D sata controller does not play well with "med_power_with_dipm".
      # It has something to do with Intel Rapid Storage Technology(IRST).
      # https://wiki.archlinux.org/title/Power_management#SATA_Active_Link_Power_Management
      # https://www.kernel.org/doc/html/latest/scsi/link_power_management_policy.html
      # Limitation: This will set all scsi hosts' power management policy.
      #             In the case of UN100D there is only 1 scsi host.
      scsi_power_policy: "medium_power"
      storage_label_fast: "ssd"
      storage_label_faster: "{{ storage_label_fast }}.nvme"
      storage_label_slow: "hdd"
      # For Minisforum UN100D devices, it has 3 possible storage devices.
      storages:
        - dev: /dev/nvme0n1
          label: "{{ storage_label_faster }}.nvme1" # NVME connection (I put an SSD)
          should_be_part_of_pool: True
        - dev: /dev/sda
          label: "{{ storage_label_fast }}.ssd1" # SATA connection (I put an SSD)
          should_be_part_of_pool: True
        - dev: /dev/sdb 
          label: "microsd.microsd1" # Micro-SD (use as root drive)
          should_be_part_of_pool: False
      storage_array_uuid: 272e200e-eb79-4269-bdf6-83e5d8c89760
